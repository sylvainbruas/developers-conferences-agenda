name: Update CFP Status

on:
  schedule:
    # Runs every day
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  
jobs:
  update:
    permissions:
      contents: write
      pull-requests: write
    if: github.repository == 'scraly/developers-conferences-agenda'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            page/package-lock.json
            tools/package-lock.json
      - working-directory: page
        run: npm ci
      - name: Fix CFP color
        working-directory: tools
        run: |
          npm ci
          node mdValidator.js
          node mdParser.js
          node fixCFPColor.js
          node geoCodes.js
      - name: Run Tests
        working-directory: page
        run: npm test -- --run
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8 # v8
        with:
          token: ${{ secrets.PAT }}
          commit-message: update cfp status color
          title: Update CFP status color
          base: main
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: update-cfp-color
          delete-branch: true
          body: |
            This PR was generated via GH action
            - Updates CFP status color green to red
            - Generates geo locations
          draft: false
      - if: steps.cpr.outputs.pull-request-number != ''
        name: Enable Pull Request Automerge
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --admin --squash 
        env:
          GH_TOKEN: ${{ secrets.PAT }}
